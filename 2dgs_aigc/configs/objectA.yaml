seed: 0

# Conda：COLMAP 与 2DGS 分环境（与 script/run_objectA.sh 一致）
conda:
  env_colmap: env_colmap
  env_gs: env_gs

# CUDA：enable=false 时不使用 GPU；device_ids 指定物理 GPU 编号（如 "0" 或 "1"）
cuda:
  enable: true
  device_ids: "0"

paths:
  raw_video_dir: data/raw/objectA_videos
  processed_dir: data/processed/objectA
  colmap_dir: data/processed/objectA/colmap
  gs_dir: data/processed/objectA/2dgs
  mesh_out: assets/meshes/objectA.obj

wandb:
  enable: true
  mode: online # online/offline/disabled
  project: 2dgs_aigc
  entity: null
  name: objectA
  tags: [objectA, colmap, 2dgs]

external:
  # 你可以填绝对路径，或保持为命令名（要求已在 PATH 中）
  colmap_bin: colmap
  ffmpeg_bin: ffmpeg

colmap:
  # 输入可以是视频或多视角图片目录：
  # - 若是视频：放在 raw_video_dir 下，脚本会抽帧到 processed_dir/frames
  # - 若是图片：直接放到 processed_dir/images 并将 extract_frames.enable=false
  extract_frames:
    enable: true
    #change the path to the video you want to use👇
    input_video: "${paths.raw_video_dir}/bottle_video.mp4"
    fps: 5
    out_dir: "${paths.processed_dir}/frames"

  image_dir: "${paths.processed_dir}/frames"
  database_path: "${paths.colmap_dir}/database.db"
  sparse_dir: "${paths.colmap_dir}/sparse"
  undistorted_dir: "${paths.colmap_dir}/dense"

  # COLMAP 典型流程（可按你自己的参数调整）
  commands:
    - "{colmap_bin} feature_extractor --database_path {database_path} --image_path {image_dir} --ImageReader.single_camera 1"
    - "{colmap_bin} exhaustive_matcher --database_path {database_path}"
    - "{colmap_bin} mapper --database_path {database_path} --image_path {image_dir} --output_path {sparse_dir}"
    - "{colmap_bin} image_undistorter --image_path {image_dir} --input_path {sparse_dir}/0 --output_path {undistorted_dir} --output_type COLMAP"

gs:
  project_root: dependences/2d-gaussian-splatting
  work_dir: "${paths.gs_dir}"
  iteration: 30000
  train_commands:
    - "python train.py -s {colmap_undistorted_dir} -m {work_dir} --quiet"
  export_mesh_commands:
    - "python render.py --iteration {iteration} -s {colmap_undistorted_dir} -m {work_dir} --skip_train --skip_test --quiet"
    - "cp {work_dir}/train/ours_{iteration}/fuse_post.ply {mesh_out}"
