# Blender 渲染用 GPU（与 conda 无关；由 run_fusion_render.sh 注入环境变量）
cuda:
  enable: true
  device_ids: "0,1,2"   # 物理 GPU 编号，如 "0" / "1" / "0,1"

paths:
  background_mesh: assets/meshes/background.ply
  objectA_mesh: assets/meshes/objectA.ply
  objectB_mesh: assets/meshes/objectB.obj
  objectC_mesh: assets/meshes/objectC.obj
  blender_scene_out: assets/blender/fusion_scene.blend
  video_out: output/videos/final.mp4
  frames_out_dir: output/screenshots/final_frames

render:
  engine: CYCLES # CYCLES/EEVEE
  device: GPU    # GPU/CPU（若 GPU 不可用会自动回退）
  resolution:
    width: 1280
    height: 720
  fps: 24
  frame_start: 1
  frame_end: 240
  cycles:
    samples: 128
    denoise: true

lighting:
  use_hdri: false
  hdri_path: null
  sun:
    enable: true
    strength: 2.5
    rotation_euler_deg: [45, 0, 35]
  ambient_strength: 0.2

camera:
  # 简单圆周漫游：以 target 为中心，半径 radius，高度 height
  target: [0.0, 0.0, 0.8]
  radius: 4.0
  height: 1.6
  look_at_offset: [0.0, 0.0, 0.0]

objects:
  - name: background
    path: "${paths.background_mesh}"
    transform:
      location: [0.0, 0.0, 0.0]
      rotation_euler_deg: [0.0, 0.0, 0.0]
      scale: [1.0, 1.0, 1.0]
    shading:
      smooth: true

  - name: objectA
    path: "${paths.objectA_mesh}"
    transform:
      location: [0.6, 0.2, 0.0]
      rotation_euler_deg: [0.0, 0.0, 20.0]
      scale: [0.6, 0.6, 0.6]
    shading:
      smooth: true

  - name: objectB
    path: "${paths.objectB_mesh}"
    transform:
      location: [-0.8, -0.1, 0.0]
      rotation_euler_deg: [0.0, 0.0, -15.0]
      scale: [0.8, 0.8, 0.8]
    shading:
      smooth: true

  - name: objectC
    path: "${paths.objectC_mesh}"
    transform:
      location: [0.0, -0.9, 0.0]
      rotation_euler_deg: [0.0, 0.0, 170.0]
      scale: [0.7, 0.7, 0.7]
    shading:
      smooth: true
