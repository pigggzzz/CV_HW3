seed: 0

conda:
  env_sdi: env_sdi

cuda:
  enable: true
  device_ids: "1"

paths:
  # SDI 训练 prompt 从此文件读取
  prompt_file: data/raw/objectB_text/dragon.txt
  # 相对 2dgs_aigc/ 根目录；pipeline 会转成绝对路径再传给 threestudio
  processed_dir: data/processed/objectB
  mesh_out: assets/meshes/objectB.obj
  # 高精度导出时的完整资产目录（.obj + .mtl + 贴图）
  mesh_assets_dir: assets/meshes/objectB

wandb:
  enable: true
  mode: online
  project: 2dgs_aigc
  entity: null
  name: objectB
  tags: [objectB, sdi, text-to-3d]

# SDI: Score Distillation via Reparametrized DDIM（threestudio/configs/sdi.yaml）
sdi:
  project_root: dependences/threestudio
  config: configs/sdi.yaml
  exp_name: score-distillation-via-inversion
  work_dir: "${paths.processed_dir}/sdi_run"
  # prompt 由 paths.prompt_file 提供，此处留空即可
  prompt: null
  gpu: "1"
  # 导出 mesh 时使用的 GPU（训练占用 GPU1 时可改为空闲卡，如 "2"）
  export_gpu: "2"
  # 与 threestudio configs/sdi.yaml 中 trainer.max_steps 一致
  export_iter: 10000
  # 网格提取精度（默认 128）；256 需配合 mc-cpu（仓库无 256_tets.npz）
  isosurface_resolution: 256
  isosurface_method: mc-cpu
  # 等值面采样分块；0 表示不分块（GPU 显存充足时更稳）
  isosurface_chunk: 0
  texture_size: 2048

  train_commands:
    - >-
      python launch.py --config {config}
      --train --gpu {gpu}
      exp_root_dir={work_dir}
      tag={wandb_name}
      use_timestamp=false
      seed={seed}
      system.prompt_processor.prompt="{prompt}"

  export_mesh_commands:
    - >-
      python launch.py
      --config {work_dir}/{exp_name}/{wandb_name}/configs/parsed.yaml
      --export --gpu 0
      exp_root_dir={work_dir}
      resume={work_dir}/{exp_name}/{wandb_name}/ckpts/last.ckpt
      system.geometry.isosurface_method={isosurface_method}
      system.geometry.isosurface_resolution={isosurface_resolution}
      system.geometry.isosurface_chunk={isosurface_chunk}
      system.exporter_type=mesh-exporter
      system.exporter.fmt=obj-mtl
      system.exporter.save_uv=true
      system.exporter.save_texture=true
      system.exporter.texture_size={texture_size}
    - mkdir -p {mesh_assets_dir}
    - cp {work_dir}/{exp_name}/{wandb_name}/save/it{export_iter}-export/model.obj {mesh_assets_dir}/model.obj
    - cp {work_dir}/{exp_name}/{wandb_name}/save/it{export_iter}-export/model.mtl {mesh_assets_dir}/model.mtl
    - cp {work_dir}/{exp_name}/{wandb_name}/save/it{export_iter}-export/texture_kd.jpg {mesh_assets_dir}/texture_kd.jpg
    - cp {mesh_assets_dir}/model.obj {mesh_out}
